name: Pull request build and deploy
'on': pull_request
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      checks: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6.0.3
      - name: Cache node modules
        id: cache-npm
        uses: actions/cache@v5.0.5
        env:
          cache-name: cache-node-modules
        with:
          # npm cache files are stored in `~/.npm` on Linux/macOS
          path: ~/.npm
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-

      - if: ${{ steps.cache-npm.outputs.cache-hit == 'false' }}
        name: List the state of node modules
        continue-on-error: true
        run: npm list
      - run: npm ci --legacy-peer-deps
      - run: npm run check
      - run: npm run test -- run --coverage --coverage.reporter=lcov --reporter=vitest-sonar-reporter --outputFile.vitest-sonar-reporter=test-report.xml --reporter=default
      - name: SonarQube Scan
        if: github.event.pull_request.head.repo.fork == false
        uses: sonarsource/sonarqube-scan-action@v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.ENTUR_SONAR_PASSWORD }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          args: >
            -Dsonar.organization=enturas-github
            -Dsonar.projectKey=entur_abzu
            -Dsonar.sources=src
            -Dsonar.tests=src
            -Dsonar.test.inclusions=src/**/*.spec.ts,src/**/*.spec.tsx,src/**/*.test.ts,src/**/*.test.tsx,src/**/*.spec.js,src/**/*.spec.jsx,src/**/*.test.js,src/**/*.test.jsx
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
            -Dsonar.testExecutionReportPaths=test-report.xml
      - run: npm run build
      - name: Copy bootstrap config
        run: cp .github/environments/dev.json build/bootstrap.json
      - name: Copy firebase config
        run: cp .github/environments/firebase.json firebase.json
      - name: Copy firebaserc
        run: cp .github/environments/.firebaserc .firebaserc
      - name: Archive deploy artifact
        uses: actions/upload-artifact@v5
        with:
          name: build
          include-hidden-files: true
          path: |
            build
            firebase.json
            .firebaserc

  preview_dev:
    needs: [build]
    if: github.event.pull_request.head.repo.fork == false
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    uses: entur/gha-firebase/.github/workflows/firebase-hosting-preview.yml@v1
    with:
      gcp_project_id: ent-ror-abzu-dev
      environment: dev
      target: dev
      build_artifact_name: build
      build_artifact_path: deploy
      entry_point: deploy
